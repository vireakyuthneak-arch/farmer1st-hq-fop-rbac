# FOP app catalog — every installable app, defined once, referenced by key.
#
#   source: formula (Homebrew CLI) | cask (Homebrew GUI app)
#   version: latest (track upstream) | "pinned" (quoted, never force-upgraded)
#
# Policy (ADR-0020): Homebrew formulae + public casks ONLY. App Store apps
# (iWork, Xcode, TestFlight, Trello) and direct downloads are out of FOP
# scope — deliver those via MDM/VPP.
schemaVersion: 1

