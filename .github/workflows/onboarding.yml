# RBEC validation gate.
#
# Division of labor (Option A):
#   GitHub Actions  -> validates the RBEC (schemas + cross-references) on every PR/push
#   HCP Terraform   -> plans on PR (speculative), applies on merge to main
#                      (VCS-driven workspace, working dir `terraform`,
#                       credentials live in workspace variables — see README)
name: validate

on:
  workflow_dispatch: {} # run it manually from the Actions tab anytime
  pull_request:
    paths: ["fop/**", "schema/**", "terraform/**", "scripts/**", ".github/workflows/**"]
  push:
    branches: [main]
    paths: ["fop/**", "schema/**", "terraform/**", "scripts/**", ".github/workflows/**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml jsonschema
      - name: Validate RBEC (schemas + cross-references)
        run: python3 scripts/validate.py validate

  terraform-lint:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: terraform }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false -input=false
      - run: terraform validate -no-color
