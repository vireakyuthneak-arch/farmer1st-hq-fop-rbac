# FOP onboarding pipeline.
#
# PR touching the RBEC or terraform  -> validate spec + terraform plan (review gate)
# Merge to main                      -> terraform apply (the onboarding "button")
#
# Master credentials (see README "Master credentials"):
#   AWS        -> NO stored key: GitHub OIDC assumes var.AWS_TERRAFORM_ROLE_ARN
#   GitHub     -> secrets.GH_ORG_TOKEN   (fine-grained org-admin token / GitHub App)
#   Cloudflare -> secrets.CLOUDFLARE_API_TOKEN (scoped: Access read/write)
name: onboarding

on:
  pull_request:
    paths: ["fop/**", "schema/**", "terraform/**"]
  push:
    branches: [main]
    paths: ["fop/**", "schema/**", "terraform/**"]

permissions:
  contents: read
  id-token: write # OIDC federation to AWS — no static AWS key anywhere

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml jsonschema
      - name: Validate RBEC (schemas + cross-references)
        run: python3 scripts/validate.py validate

  terraform:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: terraform }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS via OIDC (short-lived, no stored key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-southeast-1

      - run: terraform init -input=false
      - run: terraform validate

      - name: Plan (PR review gate)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -no-color
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply (merge to main = onboard)
        if: github.event_name == 'push'
        run: terraform apply -input=false -auto-approve
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
