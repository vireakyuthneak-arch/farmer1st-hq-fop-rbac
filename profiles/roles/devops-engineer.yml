# DevOps Engineer — apps are catalog keys; `cloud` declares access (Terraform
# realizes it — never credentials).
schemaVersion: 1
role: devops-engineer
description: Infrastructure, CI/CD, and cloud operations.

apps:
  # everyday
  - vscode
  - slack
  - granola
  - grammarly
  - rectangle
  # dev + cloud
  - git
  - gh
  - python
  - docker
  - docker-compose
  - awscli
  - terraform
  - kubectl

# trust-plane installs (admin-requiring; daemon root plane handles these)
  # from team app list 2026-07-14 (not installable via brew, handled elsewhere:
  # Notes/Terminal = macOS native; Amphetamine/Xcode = App Store -> MDM/VPP;
  # Chrome extension, Claude Code URL Handler, ohMyZsh = not brew; Plane = web app)
  - chrome
  - claude-desktop
  - claude-code
  - codex
  - chatgpt
  - iterm2
  - obsidian
  - privileges
  - pycharm
  - logi-options
  - dbeaver
  - postman
  - nvm
  - node-22
  - fnm
  - uv
  - wrangler
  - ollama
  - spotify

system:
  - docker-desktop

# per-app roles (see profiles/applications.yml; strongest wins across roles)
# NOTE: additive only — the Abra renderer ignores this key entirely
appRoles:
  roadmap: editor
  slack: member

cloud:
  aws:
    grants:
      - account: farmer1st-dev
        permissionSet: DevOpsEngineer
      - account: farmer1st-prod
        permissionSet: Developer
  github:
    org: farmer1st-hq
    teams:
      - devops
      - infrastructure
  cloudflare:
    accessGroups:
      - internal-dashboards
      - infra-admin
    dashboardRole: Administrator   # devops also administers Cloudflare itself
